services:
  web:
    container_name: granja_api
    build: .
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      - DB_USER=${DB_USER:-test}
      - DB_PASSWORD=${DB_PASSWORD:-12345}
      - DB_HOST=database
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-granja_db}
      - REDIS_HOST=cache
      - REDIS_PORT=6379
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - granja-network

  database:
    container_name: granja_database
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-test}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-12345}
      POSTGRES_DB: ${DB_NAME:-granja_db}
    ports:
      - "5432:5432"
    networks:
      - granja-network
    volumes:
      - granja_database_volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-test} -d ${DB_NAME:-granja_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  cache:
    container_name: granja_cache
    image: redis:8.6.4-trixie
    networks:
      - granja-network
    volumes:
      - granja_cache_volume:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

networks:
  granja-network:
    driver: bridge

volumes:
  granja_database_volume:
  granja_cache_volume: